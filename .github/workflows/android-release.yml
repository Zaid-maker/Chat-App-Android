name: Android Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect project paths
        id: paths
        shell: bash
        run: |
          echo "Repository root: $(pwd)"
          ls -la

          if [ -d "chatapp/android" ]; then
            APP_DIR="chatapp"
            ANDROID_DIR="chatapp/android"
            METADATA_PATH="chatapp/release-metadata.json"
            APK_PATH="chatapp/android/app/build/outputs/apk/release/app-release.apk"
          elif [ -d "android" ]; then
            APP_DIR="."
            ANDROID_DIR="android"
            METADATA_PATH="release-metadata.json"
            APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          else
            echo "Could not find expected project layout." >&2
            ls -la
            exit 1
          fi

          echo "Detected app dir: $APP_DIR"
          echo "Detected android dir: $ANDROID_DIR"
          echo "app_dir=$APP_DIR" >> "$GITHUB_OUTPUT"
          echo "android_dir=$ANDROID_DIR" >> "$GITHUB_OUTPUT"
          echo "metadata_path=$METADATA_PATH" >> "$GITHUB_OUTPUT"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: ${{ steps.paths.outputs.app_dir }}
        run: bun install --frozen-lockfile

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Set version name
        id: version
        working-directory: ${{ steps.paths.outputs.app_dir }}
        run: |
          VERSION_NAME=$(node -p "require('./package.json').version")
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Build release APK
        shell: bash
        working-directory: ${{ steps.paths.outputs.android_dir }}
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "Gradle wrapper not found in $(pwd)" >&2
            ls -la
            exit 1
          fi
          chmod +x ./gradlew
          ./gradlew assembleRelease -PVERSION_CODE=${VERSION_CODE} -PVERSION_NAME=${VERSION_NAME}
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}

      - name: Prepare release metadata
        id: metadata
        working-directory: ${{ steps.paths.outputs.app_dir }}
        run: |
          VERSION_NAME=${{ steps.version.outputs.version_name }}
          BUILD_NUMBER=${{ github.run_number }}
          TAG_NAME="android-${BUILD_NUMBER}"
          printf '{"version":"%s","buildNumber":%s,"commit":"%s","releaseTag":"%s"}' "$VERSION_NAME" "$BUILD_NUMBER" "${{ github.sha }}" "$TAG_NAME" > release-metadata.json
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag_name }}
          name: Android build ${{ github.run_number }}
          body_path: ${{ steps.paths.outputs.metadata_path }}
          files: |
            ${{ steps.paths.outputs.apk_path }}