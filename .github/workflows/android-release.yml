name: Android Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: chatapp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Set version name
        id: version
        run: |
          VERSION_NAME=$(node -p "require('./package.json').version")
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Build release APK
        shell: bash
        run: ./android/gradlew assembleRelease -PVERSION_CODE=${VERSION_CODE} -PVERSION_NAME=${VERSION_NAME}
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}

      - name: Prepare release metadata
        id: metadata
        run: |
          VERSION_NAME=${{ steps.version.outputs.version_name }}
          BUILD_NUMBER=${{ github.run_number }}
          TAG_NAME="android-${BUILD_NUMBER}"
          printf '{"version":"%s","buildNumber":%s,"commit":"%s","releaseTag":"%s"}' "$VERSION_NAME" "$BUILD_NUMBER" "${{ github.sha }}" "$TAG_NAME" > release-metadata.json
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag_name }}
          name: Android build ${{ github.run_number }}
          body_path: chatapp/release-metadata.json
          files: |
            chatapp/android/app/build/outputs/apk/release/app-release.apk