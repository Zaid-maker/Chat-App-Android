name: Android Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect project paths
        id: paths
        shell: bash
        run: |
          if [ -f "chatapp/package.json" ] && [ -f "chatapp/android/gradlew" ]; then
            echo "app_dir=chatapp" >> "$GITHUB_OUTPUT"
            echo "android_dir=chatapp/android" >> "$GITHUB_OUTPUT"
            echo "metadata_path=chatapp/release-metadata.json" >> "$GITHUB_OUTPUT"
            echo "apk_path=chatapp/android/app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_OUTPUT"
          elif [ -f "package.json" ] && [ -f "android/gradlew" ]; then
            echo "app_dir=." >> "$GITHUB_OUTPUT"
            echo "android_dir=android" >> "$GITHUB_OUTPUT"
            echo "metadata_path=release-metadata.json" >> "$GITHUB_OUTPUT"
            echo "apk_path=android/app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_OUTPUT"
          else
            echo "Could not find expected project layout." >&2
            ls -la
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: ${{ steps.paths.outputs.app_dir }}
        run: bun install --frozen-lockfile

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Set version name
        id: version
        working-directory: ${{ steps.paths.outputs.app_dir }}
        run: |
          VERSION_NAME=$(node -p "require('./package.json').version")
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Build release APK
        shell: bash
        working-directory: ${{ steps.paths.outputs.android_dir }}
        run: ./gradlew assembleRelease -PVERSION_CODE=${VERSION_CODE} -PVERSION_NAME=${VERSION_NAME}
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}

      - name: Prepare release metadata
        id: metadata
        working-directory: ${{ steps.paths.outputs.app_dir }}
        run: |
          VERSION_NAME=${{ steps.version.outputs.version_name }}
          BUILD_NUMBER=${{ github.run_number }}
          TAG_NAME="android-${BUILD_NUMBER}"
          printf '{"version":"%s","buildNumber":%s,"commit":"%s","releaseTag":"%s"}' "$VERSION_NAME" "$BUILD_NUMBER" "${{ github.sha }}" "$TAG_NAME" > release-metadata.json
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag_name }}
          name: Android build ${{ github.run_number }}
          body_path: ${{ steps.paths.outputs.metadata_path }}
          files: |
            ${{ steps.paths.outputs.apk_path }}